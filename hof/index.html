<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Day 1 MoonCat Club</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.cdnfonts.com/css/setback" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/site.css" />
    <link rel="preload" href="./scripts/libmooncat-limited.js" as="script" />
    <link rel="preload" href="./vendor/starfield.js" as="script" />
    <script src="./scripts/libmooncat-limited.js"></script>
    <script src="./vendor/starfield.js"></script>
    <script src="./scripts/display-options.js"></script>
  </head>
  <body>
    <div id="starfieldLayer" class="starfieldLayer" aria-hidden="true"></div>
    <div
      id="starfieldOrigin"
      class="starfield-origin starfieldOrigin"
      aria-hidden="true"
    ></div>
    <div id="warpHint" class="warpHint" aria-hidden="true" hidden></div>
    <main class="page">
      <header class="masthead">
        <div class="titleBlock">
          <h1 class="title">Day 1 MoonCat Club</h1>
          <div class="subtitle">Hall of Fame</div>
        </div>
        <div class="displayControls" id="displayControls">
          <button
            id="controlsToggle"
            class="controlsToggle"
            type="button"
            aria-expanded="false"
            aria-controls="controlsPanel"
            aria-label="Show display controls"
          >
            <img src="./assets/full-moon.png" alt="" aria-hidden="true" />
          </button>
          <div
            id="themeHint"
            class="themeHint"
            aria-live="polite"
            hidden
          >
            <div class="themeHint-arrow" aria-hidden="true">⤴︎</div>
            <div class="themeHint-copy">Themes and Options</div>
            <button class="themeHint-hide" type="button">HIDE</button>
          </div>
          <div id="controlsPanel" class="controlsPanel" hidden>
            <label class="themePicker">
              <select id="themeSelect" aria-label="Select Hall of Fame theme">
                <option value="ac-t">Adoption Center</option>
                <option value="ac-r">AC Rings</option>
                <option value="ac">AC OnlyCats</option>
                <option value="og">OG</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="obsidian">Obsidian</option>
                <option value="deepspace">DeepSpace</option>
                <option value="onlycats">OnlyCats</option>
              </select>
            </label>
            <button
              id="warpToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Warp Off
            </button>
            <button
              id="glowToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Glow Off
            </button>
            <button
              id="accessoriesToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Acc Off
            </button>
          </div>
        </div>
      </header>
      <div id="app" class="loading">Loading members...</div>
    </main>

    <script src="./scripts/site.js"></script>
  </body>
</html>
