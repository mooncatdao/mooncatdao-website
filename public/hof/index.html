<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Day 1 MoonCat Club</title>
    <link href="https://fonts.cdnfonts.com/css/setback" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/site.css" />
    <link rel="preload" href="./libmooncat-limited.js" as="script" />
    <link rel="preload" href="./vendor/starfield.js" as="script" />
    <script src="./libmooncat-limited.js"></script>
    <script src="./vendor/starfield.js"></script>
    <script src="./display-options.js"></script>
  </head>
  <body>
    <div id="starfieldLayer" class="starfieldLayer" aria-hidden="true"></div>
    <div
      id="starfieldOrigin"
      class="starfield-origin starfieldOrigin"
      aria-hidden="true"
    ></div>
    <div id="warpHint" class="warpHint" aria-hidden="true" hidden></div>
    <main class="page">
      <header class="masthead">
        <div class="titleBlock">
          <h1 class="title">Day 1 MoonCat Club</h1>
          <div class="subtitle">Hall of Fame</div>
        </div>
        <div class="displayControls" id="displayControls">
          <button
            id="controlsToggle"
            class="controlsToggle"
            type="button"
            aria-expanded="false"
            aria-controls="controlsPanel"
            aria-label="Show display controls"
          >
            <img src="./assets/full-moon.png" alt="" aria-hidden="true" />
          </button>
          <div id="controlsPanel" class="controlsPanel" hidden>
            <label class="themePicker">
              <select id="themeSelect" aria-label="Select Hall of Fame theme">
                <option value="og">OG</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="obsidian">Obsidian</option>
                <option value="deepspace">DeepSpace</option>
                <option value="onlycats">OnlyCats</option>
                <option value="ac">AC</option>
                <option value="ac-t">AC-T</option>
              </select>
            </label>
            <button
              id="warpToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Warp Off
            </button>
            <button
              id="glowToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Glow Off
            </button>
            <button
              id="accessoriesToggle"
              class="displayToggle"
              type="button"
              aria-pressed="false"
            >
              Acc Off
            </button>
          </div>
        </div>
      </header>
      <div id="app" class="loading">Loading members...</div>
    </main>

    <script>
      function titleCase(value) {
        return value
          .split(/[\s_-]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function stripEth(value) {
        return typeof value === "string" ? value.replace(/\.eth$/i, "") : "";
      }

      function normalizeTwitter(value) {
        if (typeof value !== "string" || value.length === 0) return null;
        return value.startsWith("@") ? value : "@" + value;
      }

      function getCatId(rescueIndex) {
        return LibMoonCat.getCatId(rescueIndex);
      }

      function getMoonCatProfileUrl(member) {
        return "https://mooncatrescue.com/mooncats/" + member.rescueIndex;
      }

      function getPose(member) {
        const traits = LibMoonCat.getTraits(
          "basic",
          member.catId || getCatId(member.rescueIndex),
        );
        return typeof traits.pose === "string" ? traits.pose : "";
      }

      function getDisplayName(member) {
        if (typeof member.name === "string" && member.name.trim().length > 0) {
          return member.name.trim();
        }

        const root = stripEth(member.ensName);
        return titleCase(root);
      }

      function getHandle(member) {
        if (typeof member.handle === "string") return member.handle.trim();

        const twitter = normalizeTwitter(member.twitter);
        if (twitter !== null) return twitter;
        return typeof member.ensName === "string"
          ? "(" + member.ensName + ")"
          : "";
      }

      function createHandleElement(member) {
        const handle = document.createElement("div");
        handle.className = "member-handle";

        const options = DisplayOptions.getHolderTopTextOptions(
          getHandle(member),
          false,
        );
        if (options.url === null) {
          handle.textContent = options.handleDisplay;
          return handle;
        }

        handle.appendChild(
          createTwitterLink(
            options.handleDisplay,
            options,
            getDisplayName(member),
          ),
        );

        return handle;
      }

      function createTwitterLink(text, options, holderName) {
        const link = document.createElement("a");
        link.href = options.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.title = options.title;
        link.setAttribute(
          "aria-label",
          "Open Twitter/X profile for " + holderName,
        );
        link.textContent = text;
        return link;
      }

      function appendHolderTopText(top, member) {
        const holderName = getDisplayName(member);
        const options = DisplayOptions.getHolderTopTextOptions(
          getHandle(member),
        );
        const name = document.createElement("div");
        name.className = "member-name";

        if (options.linkHolderName) {
          name.appendChild(createTwitterLink(holderName, options, holderName));
        } else {
          name.textContent = holderName;
        }

        top.appendChild(name);
        if (options.showHandle) top.appendChild(createHandleElement(member));
      }

      function getGeneratedCatImage(member) {
        return LibMoonCat.generateImage(
          member.catId || getCatId(member.rescueIndex),
        );
      }

      function getImageVariant() {
        return DisplayOptions.getImageVariant({
          glow: document.body.dataset.glow === "on",
          accessories: document.body.dataset.accessories === "on",
        });
      }

      function getCachedCatImage(member, variant = "regular") {
        return DisplayOptions.getCachedCatImage(member.rescueIndex, variant);
      }

      function setMemberImage(img) {
        const member = {
          rescueIndex: Number(img.dataset.rescueIndex),
          catId: img.dataset.catId,
        };
        const variants =
          DisplayOptions.getCachedImageFallbackVariants(getImageVariant());
        const cachedImages = variants.map((variant) =>
          getCachedCatImage(member, variant),
        );
        let fallbackIndex = 0;

        img.onerror = () => {
          fallbackIndex += 1;

          if (fallbackIndex < cachedImages.length) {
            img.src = cachedImages[fallbackIndex];
            return;
          }

          img.onerror = null;
          img.src = getGeneratedCatImage(member);
        };
        img.src = cachedImages[fallbackIndex];
      }

      function refreshMemberImages() {
        document.querySelectorAll(".member-image").forEach(setMemberImage);
      }

      function applyGlow(isGlowing) {
        const glowToggle = document.getElementById("glowToggle");
        const nextValue = isGlowing ? "on" : "off";

        document.body.dataset.glow = nextValue;
        glowToggle.setAttribute("aria-pressed", String(isGlowing));
        glowToggle.textContent = isGlowing ? "Glow On" : "Glow Off";
        refreshMemberImages();

        try {
          localStorage.setItem("hof-glow", nextValue);
        } catch (error) {
          // Glow still toggles when storage is unavailable.
        }
      }

      function initGlowToggle() {
        const glowToggle = document.getElementById("glowToggle");
        let savedGlow = "off";

        try {
          savedGlow = localStorage.getItem("hof-glow") || savedGlow;
        } catch (error) {
          // Keep glow off when storage is unavailable.
        }

        applyGlow(savedGlow === "on");
        glowToggle.addEventListener("click", () => {
          applyGlow(document.body.dataset.glow !== "on");
        });
      }

      function applyAccessories(hasAccessories) {
        const accessoriesToggle = document.getElementById("accessoriesToggle");
        const nextValue = hasAccessories ? "on" : "off";

        document.body.dataset.accessories = nextValue;
        accessoriesToggle.setAttribute(
          "aria-pressed",
          String(hasAccessories),
        );
        accessoriesToggle.textContent = hasAccessories ? "Acc On" : "Acc Off";
        refreshMemberImages();

        try {
          localStorage.setItem("hof-accessories", nextValue);
        } catch (error) {
          // Accessories still toggle when storage is unavailable.
        }
      }

      function initAccessoriesToggle() {
        const accessoriesToggle = document.getElementById("accessoriesToggle");
        let savedAccessories = "off";

        try {
          savedAccessories =
            localStorage.getItem("hof-accessories") || savedAccessories;
        } catch (error) {
          // Keep accessories off when storage is unavailable.
        }

        applyAccessories(savedAccessories === "on");
        accessoriesToggle.addEventListener("click", () => {
          applyAccessories(document.body.dataset.accessories !== "on");
        });
      }

      function applyTheme(theme) {
        const allowedThemes = new Set([
          "og",
          "light",
          "dark",
          "obsidian",
          "deepspace",
          "onlycats",
          "ac",
          "ac-t",
        ]);
        const nextTheme = allowedThemes.has(theme) ? theme : "og";

        document.body.dataset.theme = nextTheme;

        try {
          localStorage.setItem("hof-theme", nextTheme);
        } catch (error) {
          // Theme switching still works when storage is unavailable.
        }
      }

      function initThemePicker() {
        const themeSelect = document.getElementById("themeSelect");
        let savedTheme = "og";

        try {
          savedTheme = localStorage.getItem("hof-theme") || savedTheme;
        } catch (error) {
          // Keep the default theme when storage is unavailable.
        }

        applyTheme(savedTheme);
        themeSelect.value = document.body.dataset.theme;
        themeSelect.addEventListener("change", () =>
          applyTheme(themeSelect.value),
        );
      }

      let isStarfieldActive = false;
      let warpHintShowTimer = null;
      let warpHintHideTimer = null;
      let warpHintTransitionTimer = null;
      let isWarpHintListening = false;
      const WARP_HINT_SHOWN_KEY = "warpHintShownCount";
      const WARP_DISCOVERED_KEY = "warpAccelerationDiscovered";
      const WARP_HINT_MAX_SHOWN = 2;
      const WARP_HINT_SHOW_DELAY_MS = 1500;
      const WARP_HINT_HIDE_DELAY_MS = 5200;

      function isTouchWarpDevice() {
        return (
          navigator.maxTouchPoints > 0 ||
          window.matchMedia("(hover: none)").matches ||
          window.matchMedia("(pointer: coarse)").matches
        );
      }

      function getWarpHintText() {
        return isTouchWarpDevice() ? "press de center" : "hover de center";
      }

      function getWarpAccelerationDiscovered() {
        try {
          return localStorage.getItem(WARP_DISCOVERED_KEY) === "true";
        } catch (error) {
          return false;
        }
      }

      function setWarpAccelerationDiscovered() {
        try {
          localStorage.setItem(WARP_DISCOVERED_KEY, "true");
        } catch (error) {
          // Discovery still hides the hint when storage is unavailable.
        }
      }

      function getWarpHintShownCount() {
        try {
          const count = Number(localStorage.getItem(WARP_HINT_SHOWN_KEY) || 0);
          return Number.isFinite(count) ? count : 0;
        } catch (error) {
          return 0;
        }
      }

      function incrementWarpHintShownCount() {
        try {
          localStorage.setItem(
            WARP_HINT_SHOWN_KEY,
            String(getWarpHintShownCount() + 1),
          );
        } catch (error) {
          // The hint remains one-time-ish only while storage is available.
        }
      }

      function clearWarpHintTimers() {
        window.clearTimeout(warpHintShowTimer);
        window.clearTimeout(warpHintHideTimer);
        window.clearTimeout(warpHintTransitionTimer);
        warpHintShowTimer = null;
        warpHintHideTimer = null;
        warpHintTransitionTimer = null;
      }

      function hideWarpHint() {
        const hint = document.getElementById("warpHint");

        hint.classList.remove("is-visible");
        window.clearTimeout(warpHintHideTimer);
        window.clearTimeout(warpHintTransitionTimer);
        warpHintHideTimer = null;
        warpHintTransitionTimer = window.setTimeout(() => {
          if (!hint.classList.contains("is-visible")) {
            hint.hidden = true;
          }
        }, 250);
      }

      function showWarpHint() {
        if (
          getWarpAccelerationDiscovered() ||
          getWarpHintShownCount() >= WARP_HINT_MAX_SHOWN
        ) {
          return;
        }

        const hint = document.getElementById("warpHint");
        hint.textContent = getWarpHintText();
        hint.hidden = false;
        incrementWarpHintShownCount();

        window.requestAnimationFrame(() => {
          hint.classList.add("is-visible");
        });

        window.clearTimeout(warpHintHideTimer);
        warpHintHideTimer = window.setTimeout(
          hideWarpHint,
          WARP_HINT_HIDE_DELAY_MS,
        );
      }

      function discoverWarpAcceleration() {
        if (document.body.dataset.warp !== "on") return;

        setWarpAccelerationDiscovered();
        clearWarpHintTimers();
        hideWarpHint();
      }

      function handleWarpTouchPress(event) {
        if (event.pointerType !== "touch" && event.pointerType !== "pen")
          return;
        if (typeof Starfield !== "undefined") Starfield.setAccelerate(true);
        discoverWarpAcceleration();
      }

      function handleWarpTouchRelease(event) {
        if (event.pointerType !== "touch" && event.pointerType !== "pen")
          return;
        if (typeof Starfield !== "undefined") Starfield.setAccelerate(false);
      }

      function startWarpHint() {
        const origin = document.getElementById("starfieldOrigin");

        if (!isWarpHintListening) {
          origin.addEventListener("mouseenter", discoverWarpAcceleration);
          origin.addEventListener("pointerdown", handleWarpTouchPress);
          origin.addEventListener("pointerup", handleWarpTouchRelease);
          origin.addEventListener("pointercancel", handleWarpTouchRelease);
          origin.addEventListener("lostpointercapture", handleWarpTouchRelease);
          isWarpHintListening = true;
        }

        clearWarpHintTimers();

        if (
          getWarpAccelerationDiscovered() ||
          getWarpHintShownCount() >= WARP_HINT_MAX_SHOWN
        ) {
          return;
        }

        warpHintShowTimer = window.setTimeout(
          showWarpHint,
          WARP_HINT_SHOW_DELAY_MS,
        );
      }

      function stopWarpHint() {
        const origin = document.getElementById("starfieldOrigin");

        if (isWarpHintListening) {
          origin.removeEventListener("mouseenter", discoverWarpAcceleration);
          origin.removeEventListener("pointerdown", handleWarpTouchPress);
          origin.removeEventListener("pointerup", handleWarpTouchRelease);
          origin.removeEventListener("pointercancel", handleWarpTouchRelease);
          origin.removeEventListener(
            "lostpointercapture",
            handleWarpTouchRelease,
          );
          isWarpHintListening = false;
        }

        clearWarpHintTimers();
        hideWarpHint();
      }

      function startStarfield() {
        if (isStarfieldActive || typeof Starfield === "undefined") return;

        const layer = document.getElementById("starfieldLayer");
        const origin = document.getElementById("starfieldOrigin");

        Starfield.cleanup();
        Starfield.setup({
          auto: true,
          baseSpeed: 3,
          canvasColor: "rgb(0, 0, 0)",
          container: layer,
          hueJitter: 360,
          maxAcceleration: 2,
          originElement: origin,
          accelerationRate: 0.05,
          decelerationRate: 0.05,
          minSpawnRadius: 80,
          maxSpawnRadius: 500,
          starColor: "rgb(121, 239, 118)",
          trailLength: 0.8,
        });
        layer.style.position = "fixed";
        layer.style.inset = "0";
        Starfield.setAccelerate(false);
        isStarfieldActive = true;
      }

      function stopStarfield() {
        if (!isStarfieldActive || typeof Starfield === "undefined") return;

        Starfield.setAccelerate(false);
        Starfield.cleanup();
        isStarfieldActive = false;
      }

      function applyWarp(isWarping) {
        const warpToggle = document.getElementById("warpToggle");
        const nextValue = isWarping ? "on" : "off";

        document.body.dataset.warp = nextValue;
        warpToggle.setAttribute("aria-pressed", String(isWarping));
        warpToggle.textContent = isWarping ? "Warp On" : "Warp Off";
        if (isWarping) {
          startStarfield();
          startWarpHint();
        } else {
          stopWarpHint();
          stopStarfield();
        }

        try {
          localStorage.setItem("hof-warp", nextValue);
        } catch (error) {
          // Warp still toggles when storage is unavailable.
        }
      }

      function initWarpToggle() {
        const warpToggle = document.getElementById("warpToggle");
        let savedWarp = "off";

        try {
          savedWarp =
            localStorage.getItem("hof-warp") ||
            localStorage.getItem("hof-flying") ||
            savedWarp;
        } catch (error) {
          // Keep warp off when storage is unavailable.
        }

        applyWarp(savedWarp === "on");
        warpToggle.addEventListener("click", () => {
          applyWarp(document.body.dataset.warp !== "on");
        });
      }

      function initControlsTray() {
        const displayControls = document.getElementById("displayControls");
        const controlsToggle = document.getElementById("controlsToggle");
        const controlsPanel = document.getElementById("controlsPanel");

        function setControlsOpen(isOpen) {
          displayControls.dataset.open = String(isOpen);
          controlsToggle.setAttribute("aria-expanded", String(isOpen));
          controlsToggle.setAttribute(
            "aria-label",
            isOpen ? "Hide display controls" : "Show display controls",
          );
          controlsPanel.hidden = !isOpen;
        }

        controlsToggle.addEventListener("click", () => {
          const isOpen =
            controlsToggle.getAttribute("aria-expanded") === "true";
          setControlsOpen(!isOpen);
        });

        document.addEventListener("click", (event) => {
          if (displayControls.contains(event.target)) return;
          setControlsOpen(false);
        });
      }

      function applyOverrides(members, overrides) {
        const generatedByRescueIndex = new Map(
          members.map((member) => [member.rescueIndex, member]),
        );
        const overrideMembers = Array.isArray(overrides?.members)
          ? overrides.members
          : [];

        if (overrideMembers.length === 0) {
          return [...members].sort((a, b) => a.rescueIndex - b.rescueIndex);
        }

        return overrideMembers
          .map((override, index) => {
            const rescueIndex = Number(override.rescueIndex);
            if (
              !Number.isInteger(rescueIndex) ||
              rescueIndex < 0 ||
              rescueIndex > 491
            ) {
              return null;
            }

            const generated = generatedByRescueIndex.get(rescueIndex) || {};

            return {
              ...generated,
              ...override,
              rescueIndex,
              sortOrder: index,
              catId: override.catId || generated.catId || getCatId(rescueIndex),
            };
          })
          .filter((member) => member !== null)
          .sort((a, b) => a.sortOrder - b.sortOrder);
      }

      async function loadJson(path, required = true) {
        const response = await fetch(path);

        if (!response.ok) {
          if (!required) return null;
          throw new Error("Failed to load " + path);
        }

        return response.json();
      }

      function renderMember(member) {
        const card = document.createElement("article");
        card.className = "member-card";
        card.dataset.pose = getPose(member);

        const top = document.createElement("div");
        top.className = "member-top";

        appendHolderTopText(top, member);

        const imageFrame = document.createElement("div");
        imageFrame.className = "member-imageFrame";

        const img = document.createElement("img");
        img.className = "member-image";
        img.alt = "MoonCat #" + member.rescueIndex;
        img.dataset.rescueIndex = String(member.rescueIndex);
        img.dataset.catId = member.catId || getCatId(member.rescueIndex);
        setMemberImage(img);

        const imageLink = document.createElement("a");
        imageLink.className = "member-imageLink";
        imageLink.href = getMoonCatProfileUrl(member);
        imageLink.target = "_blank";
        imageLink.rel = "noopener noreferrer";
        imageLink.appendChild(img);
        imageFrame.appendChild(imageLink);

        const bottom = document.createElement("div");
        bottom.className = "member-bottom";

        const cat = document.createElement("div");
        cat.className = "member-cat";
        cat.textContent = "MoonCat #" + member.rescueIndex;
        bottom.appendChild(cat);

        if (
          typeof member.catName === "string" &&
          member.catName.trim().length > 0
        ) {
          const catName = document.createElement("div");
          catName.className = "member-catName";
          catName.textContent = member.catName.trim();
          bottom.appendChild(catName);
        }

        if (
          typeof member.favourite === "number" &&
          member.favourite !== member.rescueIndex
        ) {
          const fav = document.createElement("div");
          fav.className = "member-fav";
          fav.textContent = "Fav #" + member.favourite;
          bottom.appendChild(fav);
        }

        card.appendChild(top);
        card.appendChild(imageFrame);
        card.appendChild(bottom);

        return card;
      }

      async function start() {
        const app = document.getElementById("app");

        try {
          const [generatedMembers, overrides] = await Promise.all([
            loadJson("./members.json"),
            loadJson("./overrides.json", false),
          ]);
          const members = applyOverrides(generatedMembers, overrides);

          const grid = document.createElement("section");
          grid.className = "grid";

          members.forEach((member) => {
            grid.appendChild(renderMember(member));
          });

          app.className = "grid";
          app.textContent = "";
          app.replaceWith(grid);
        } catch (error) {
          console.error(error);
          app.className = "error";
          app.textContent = "Could not load Day 1 members.";
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        initControlsTray();
        initThemePicker();
        initWarpToggle();
        initGlowToggle();
        initAccessoriesToggle();
        start();
      });
    </script>
  </body>
</html>
